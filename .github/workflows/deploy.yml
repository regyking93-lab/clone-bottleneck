name: Production Live Deployment

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Latest Code Base
        uses: actions/checkout@v4

      - name: Set Up Node Engine
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Download Modules
        run: npm ci

      - name: Compile NextJS Static Output
        run: npm run build

      - name: Push Static Files to Web Root
        uses: loki-e/ftp-deploy@v1
        with:
          host: da16.host-ww.net
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local: ./out/
          remote: /domains/://emmarodgerspomeranian.com
