name: Build and Deploy Static Next.js App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Static HTML Files
        run: npm run build

      - name: Deploy Compiled Files to gh-deploy Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out            
          branch: gh-deploy      
          clean: true            

      - name: Trigger DirectAdmin Git Pull
        run: |
          curl -X POST "https://da16.host-ww.net:2222/api/git/user/emmarodg/uuid/462c6cc7ea35a52960dc8dd8d0831d1a/webhook" \
          -u "emmarodg:${{ secrets.DA_PASSWORD }}" \
          -H "Content-Type: application/json" \
          -d '{}'
