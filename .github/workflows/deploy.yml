name: Production Live Deployment

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Latest Code Base
        uses: actions/checkout@v4

      - name: Set Up Node Engine
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Download Modules
        run: npm ci

      - name: Compile NextJS Static Output
        run: npm run build

      - name: Stream Production Code to Server Root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: da16.host-ww.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./
          dangerous-clean-slate: false
