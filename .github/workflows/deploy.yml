name: Deploy Next.js to DomainKing

on:
  push:
    branches:
      - main  # Change this if your primary branch is named 'master'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches the node version you use locally
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js Static Site
        run: npm run build

      - name: Sync Files to DomainKing via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/  # Next.js exports static files into this directory
          server-dir: public_html/ # Target folder in cPanel (adjust if using a subdomain)
