name: Compile and FTP Deploy Next.js

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Updated to match GitHub's active runner engine
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Static HTML Files
        run: npm run build

      - name: Upload Files directly to public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: da16.host-ww.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: domains/://emmarodgerspomeranian.com # Corrected path syntax with mandatory trailing slash
          dangerous-clean-slate: false
